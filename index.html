<style>
  :root{
    --bg:#0E1013;
    --card:#181B20;
    --card-raised:#1F232A;
    --hairline:rgba(198,161,91,0.16);
    --accent:#C6A15B;
    --accent-dim:#8F7239;
    --danger:#B0453F;
    --success:#4C7A5A;
    --text:#EDE9DF;
    --text-dim:#9A9C9C;
    --text-faint:#5C5F5F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 600px at 50% -10%, rgba(198,161,91,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 20px 80px;
  }
  .stage{width:100%;max-width:560px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent-dim);
    margin:0 0 6px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:38px;
    margin:0 0 4px;
    color:var(--text);
  }
  .sub{color:var(--text-dim);font-size:14.5px;margin:0 0 32px;line-height:1.5;}
  .folder{
    background:var(--card);
    border:1px solid var(--hairline);
    border-radius:3px;
    padding:32px 30px;
    position:relative;
  }
  .folder::before{
    content:'';
    position:absolute;
    top:0;left:24px;
    width:64px;height:5px;
    background:var(--card-raised);
    border:1px solid var(--hairline);
    border-top:none;
    border-radius:0 0 4px 4px;
  }
  .row{display:flex;gap:12px;}
  button{
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:14.5px;
    cursor:pointer;
    border-radius:2px;
    transition:background .15s ease, transform .1s ease;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--accent);
    color:#26200F;
    border:1px solid var(--accent);
    padding:12px 20px;
    width:100%;
  }
  .btn-primary:hover{background:#D4AE68;}
  .btn-primary:disabled{opacity:0.45;cursor:default;}
  .btn-ghost{
    background:transparent;
    color:var(--text-dim);
    border:1px solid var(--hairline);
    padding:12px 20px;
    width:100%;
  }
  .btn-ghost:hover{border-color:var(--accent-dim);color:var(--text);}
  .btn-link{
    background:none;border:none;color:var(--accent-dim);
    font-size:13px;text-decoration:underline;padding:0;width:auto;
  }
  input[type=text],input[type=password]{
    width:100%;
    background:#101216;
    border:1px solid var(--hairline);
    color:var(--text);
    padding:12px 14px;
    border-radius:2px;
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;
    letter-spacing:0.03em;
    margin-bottom:14px;
    outline:none;
  }
  input:focus{border-color:var(--accent);}
  label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:8px;
  }
  .clue-box{
    background:var(--card-raised);
    border-left:2px solid var(--accent);
    padding:20px 22px;
    margin-bottom:22px;
    font-family:'Cormorant Garamond',serif;
    font-size:20px;
    line-height:1.55;
    color:var(--text);
  }
  .clue-box .tag{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent-dim);
    margin-bottom:10px;
  }
  .clue-grid{
    display:grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap:10px;
    margin-bottom:22px;
  }
  .clue-grid .clue-box{
    padding:10px;
    margin-bottom:0;
    font-size:12.5px;
    line-height:1.4;
    min-width:0;
    overflow-wrap:break-word;
    word-break:normal;
    hyphens:none;
  }
  .clue-grid .clue-box .tag{
    font-size:8.5px;
    margin-bottom:6px;
    overflow-wrap:break-word;
    word-break:normal;
  }
  .clue-grid .clue-location{
    font-size:10px;
    overflow-wrap:break-word;
    word-break:normal;
  }
  .clue-grid .clue-photo-gallery{
    margin:8px 0 4px;
    gap:6px;
  }
  .clue-grid .clue-photo{
    width:100%;
    max-width:100%;
    height:auto;
    object-fit:contain;
  }
  .dots{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--card-raised);border:1px solid var(--hairline);
  }
  .dot.filled{background:var(--accent);border-color:var(--accent);}
  .error-msg{
    color:var(--danger);font-size:13px;margin:-6px 0 14px;
    font-family:'IBM Plex Mono',monospace;
  }
  .notice-msg{
    color:var(--success);font-size:13px;margin:-6px 0 14px;
    font-family:'IBM Plex Mono',monospace;
  }
  .finished{
    text-align:center;
    padding:20px 0 6px;
  }
  .back{
    background:none;border:none;color:var(--text-faint);
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    margin-bottom:18px;padding:0;width:auto;cursor:pointer;
  }
  .back:hover{color:var(--accent-dim);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px;}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--hairline);}
  th{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--text-faint);font-weight:400;
  }
  td{color:var(--text-dim);}
  .clue-row, .team-row{
    background:var(--card-raised);
    border:1px solid var(--hairline);
    border-radius:2px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .clue-row-top, .team-row .clue-row-top{display:flex;gap:8px;margin-bottom:8px;}
  .clue-row-top input{margin-bottom:0;}
  .clue-row-top .clue-name{flex:1.1;}
  .clue-row-top .clue-code{flex:1;}
  .icon-btn{
    background:transparent;border:1px solid var(--hairline);
    color:var(--text-dim);width:38px;flex:none;padding:0;
  }
  .icon-btn:hover{border-color:var(--danger);color:var(--danger);}
  .photo-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .photo-row .btn-ghost{width:auto;padding:8px 14px;font-size:13px;}
  .photo-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .photo-thumb-wrap{position:relative;}
  .photo-thumb-wrap .photo-preview{
    width:56px;height:56px;object-fit:cover;border-radius:2px;
    border:1px solid var(--hairline);display:block;
  }
  .photo-thumb-remove{
    position:absolute;top:-6px;right:-6px;width:18px;height:18px;
    border-radius:50%;background:var(--danger);color:#EDE9DF;border:none;
    font-size:12px;line-height:1;cursor:pointer;padding:0;
  }
  .clue-photo{
    max-width:100%;
    height:auto;
    object-fit:contain;
    border-radius:2px;
    display:block;
  }
  .clue-photo-gallery{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin:12px 0 4px;
  }
  .clue-location{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:var(--text-dim);margin:0 0 4px;
  }
  textarea{
    width:100%;background:#101216;border:1px solid var(--hairline);
    color:var(--text);padding:10px 12px;border-radius:2px;
    font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;
    resize:vertical;min-height:56px;outline:none;margin-bottom:0;
  }
  textarea:focus{border-color:var(--accent);}
  .section-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    letter-spacing:0.12em;text-transform:uppercase;
    color:var(--accent-dim);margin:26px 0 12px;
  }
  .hint{color:var(--text-faint);font-size:12.5px;margin:6px 0 0;}
  .scanner-wrap{
    margin-top:14px;
    border:1px solid var(--hairline);
    border-radius:2px;
    overflow:hidden;
    background:#000;
    position:relative;
  }
  .scanner-wrap video{
    width:100%;
    display:block;
    max-height:280px;
    object-fit:cover;
  }
  .scanner-frame{
    position:absolute;
    inset:14%;
    border:2px solid var(--accent);
    border-radius:6px;
    pointer-events:none;
  }
  .scanner-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--text-dim);
    padding:10px 4px 0;
  }
  .qr-preview{
    display:flex;align-items:center;gap:12px;margin-top:10px;
  }
  .qr-canvas-box{
    background:#fff;padding:6px;border-radius:2px;line-height:0;
  }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- PASTE YOUR FIREBASE CONFIG HERE (see README for setup steps) ----
const firebaseConfig = {
  apiKey: "AIzaSyCcTiO7bWsVoYgSFIKavKQwAybeygc7v7k",
  authDomain: "treasurehunt-5bfd5.firebaseapp.com",
  projectId: "treasurehunt-5bfd5",
  storageBucket: "treasurehunt-5bfd5.firebasestorage.app",
  messagingSenderId: "613241168579",
  appId: "1:613241168579:web:2b1ea815a054083b7cb876"
};
// ------------------------------------------------------------------

const NEEDS_SETUP = firebaseConfig.apiKey === "YOUR_API_KEY";
let db = null;
if(!NEEDS_SETUP){
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
}

let state = { view: 'role', team: null, error: '', adminUnlocked: false, showHistory: false, notice: '' };

const SESSION_KEY = 'clue-hunt-session';
function persistTeamSession(slug){
  try{ localStorage.setItem(SESSION_KEY, slug); }catch(e){}
}
function clearTeamSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}
async function restoreSession(){
  let savedSlug = null;
  try{ savedSlug = localStorage.getItem(SESSION_KEY); }catch(e){}
  if(!savedSlug) return;
  const team = await getTeam(savedSlug);
  if(team){
    state.team = { slug: savedSlug, ...team };
    state.view = 'play';
  } else {
    clearTeamSession();
  }
}

function slugify(name){
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'team';
}

async function getConfig(){
  const fallback = { title: 'The Case File', intro: 'A trail of coded evidence awaits. Enter the first code to begin.', pin: '1234', clues: [] };
  if(!db) return fallback;
  try{
    const snap = await getDoc(doc(db,'config','main'));
    const base = snap.exists() ? snap.data() : {};
    const cluesSnap = await getDocs(query(collection(db,'clues'), orderBy('order')));
    const clues = cluesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    return {
      title: base.title || fallback.title,
      intro: base.intro || fallback.intro,
      pin: base.pin || fallback.pin,
      clues
    };
  }catch(e){
    return fallback;
  }
}
async function saveConfig(cfg, previousClueIds){
  const rows = cfg.clues || [];
  const writes = [];
  const keptIds = new Set();
  rows.forEach((c, i) => {
    const data = { name: c.name||'', code: c.code||'', location: c.location||'', text: c.text||'', photos: c.photos||[], order: i };
    let ref;
    if(c.id){
      ref = doc(db,'clues', c.id);
    } else {
      ref = doc(collection(db,'clues'));
    }
    keptIds.add(ref.id);
    writes.push(setDoc(ref, data));
  });
  (previousClueIds || []).forEach(id => {
    if(!keptIds.has(id)) writes.push(deleteDoc(doc(db,'clues', id)));
  });
  writes.push(setDoc(doc(db,'config','main'), { title: cfg.title, intro: cfg.intro, pin: cfg.pin }));
  await Promise.all(writes);
}
async function getTeam(slug){
  if(!db) return null;
  try{
    const snap = await getDoc(doc(db,'teams',slug));
    return snap.exists() ? snap.data() : null;
  }catch(e){ return null; }
}
async function saveTeam(slug, data){
  if(!db) return;
  await setDoc(doc(db,'teams',slug), data);
}
async function getAllTeams(){
  if(!db) return [];
  try{
    const snap = await getDocs(collection(db,'teams'));
    return snap.docs.map(d => ({ slug: d.id, ...d.data() }));
  }catch(e){ return []; }
}
async function deleteTeam(slug){
  if(!db) return;
  try{ await deleteDoc(doc(db,'teams',slug)); }catch(e){}
}

function render(){
  const app = document.getElementById('app');
  if(NEEDS_SETUP){ app.innerHTML = viewSetupNeeded(); return; }
  if(state.view === 'role') app.innerHTML = viewRole();
  else if(state.view === 'join') app.innerHTML = viewJoin();

  else if(state.view === 'admin') renderAdmin();
  bindGlobal();
}

async function renderPlay(){
  stopScanner();
  const app = document.getElementById('app');
  const cfg = await getConfig();
  const clues = cfg.clues || [];
  const team = state.team;
  team.found = team.found || [];
  const total = clues.length;
  const doneCount = team.found.length;
  const finished = total > 0 && doneCount >= total;

  const dots = clues.map(c => `<div class="dot ${team.found.includes(c.id) ? 'filled':''}"></div>`).join('');

  if(state.showHistory){
    const found = clues.filter(c => team.found.includes(c.id));
    const historyHtml = found.length
      ? `<div class="clue-grid">${found.map(c => `
          <div class="clue-box">
            <span class="tag">${escapeHtml(c.name || 'Clue')}</span>
            ${renderClueBody(c)}
          </div>
        `).join('')}</div>`
      : `<p class="hint">No clues found yet — enter a code to begin.</p>`;

    app.innerHTML = `
      <button class="back" data-nav="role">&larr; leave</button>
      <p class="eyebrow">Team file</p>
      <h1>${escapeHtml(team.name)}</h1>
      <p class="sub">${found.length} clue${found.length===1?'':'s'} found so far.</p>
      <button class="btn-ghost" id="back-to-hunt" style="margin-bottom:20px;">&larr; Back to hunt</button>
      ${historyHtml}
    `;
    bindGlobal();
    document.getElementById('back-to-hunt').onclick = () => { state.showHistory = false; renderPlay(); };
    return;
  }

  const mainHtml = `
    <label>Enter a code</label>
    <input type="text" id="code-input" placeholder="Type the code here" autofocus>
    ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
    ${state.notice ? `<div class="notice-msg">${escapeHtml(state.notice)}</div>` : ''}
    <div class="row">
      <button class="btn-primary" id="submit-code">Unlock clue</button>
      <button class="btn-ghost" id="scan-btn" style="flex:none;width:auto;padding:12px 18px;">Scan code</button>
    </div>
    <div id="scanner-panel"></div>
    ${doneCount === 0 && !finished ? `<p class="hint" style="margin-top:14px;">${escapeHtml(cfg.intro)}</p>` : ''}
    ${finished ? `<p class="hint" style="margin-top:14px;">You're caught up on every code released so far. Try a new one whenever it's announced.</p>` : ''}
  `;

  app.innerHTML = `
    <button class="back" data-nav="role">&larr; leave</button>
    <p class="eyebrow">Team file</p>
    <h1>${escapeHtml(team.name)}</h1>
    <p class="sub">${finished ? 'All current clues found.' : `${total - doneCount} clue${total-doneCount===1?'':'s'} remaining.`}</p>
    <div class="dots">${dots}</div>
    <div class="folder">${mainHtml}</div>
    <button class="btn-ghost" id="your-clues-btn" style="margin-top:16px;">Your clues (${doneCount})</button>
  `;
  bindGlobal();
  document.getElementById('your-clues-btn').onclick = () => { stopScanner(); state.showHistory = true; state.notice=''; renderPlay(); };

  const submitBtn = document.getElementById('submit-code');
  const scanBtn = document.getElementById('scan-btn');
  if(scanBtn){
    scanBtn.onclick = () => {
      startScanner((text) => {
        const input = document.getElementById('code-input');
        if(input) input.value = text;
        if(submitBtn) submitBtn.click();
      });
    };
  }
  if(submitBtn){
    submitBtn.onclick = async () => {
      const input = document.getElementById('code-input');
      const val = input.value.trim();
      state.notice = '';
      if(!val){ state.error = 'Enter a code first.'; renderPlay(); return; }
      const matched = clues.find(c => c.code && val.toLowerCase() === String(c.code).trim().toLowerCase());
      if(!matched){
        state.error = 'That code doesn\'t match any clue. Try again.';
        renderPlay();
        return;
      }
      if(team.found.includes(matched.id)){
        state.error = '';
        state.notice = 'You already unlocked this one — check Your clues to view it.';
        renderPlay();
        return;
      }
      team.found.push(matched.id);
      team.history = team.history || [];
      team.history.push({ code: val, clueId: matched.id, ts: Date.now() });
      if(team.found.length >= clues.length) team.finishedAt = Date.now();
      await saveTeam(team.slug, { name: team.name, found: team.found, history: team.history, startedAt: team.startedAt, finishedAt: team.finishedAt });
      state.team = team;
      state.error = '';
      state.notice = `Unlocked: ${matched.name || 'a new clue'}!`;
      renderPlay();
    };
    document.getElementById('code-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') submitBtn.click(); });
  }
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('read failed'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('image load failed'));
      img.onload = () => {
        const maxW = 720;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

    row.querySelector('.remove-team').onclick = () => row.remove();

        name,
        password,

      };
      writes.push(saveTeam(slug, data));
    });

    try{
      await Promise.all(writes);
      await renderAdmin();

    })));

function attachRowHandlers(row){
  row.querySelector('.remove-clue').onclick = () => row.remove();
  row.querySelector('.move-up').onclick = () => {
    const prev = row.previousElementSibling;
    if(prev) row.parentNode.insertBefore(row, prev);
  };
  row.querySelector('.move-down').onclick = () => {
    const next = row.nextElementSibling;
    if(next) row.parentNode.insertBefore(next, row);
  };
  const fileInput = row.querySelector('.clue-photo-input');
  const photoBtn = row.querySelector('.photo-btn');
  const thumbsBox = row.querySelector('.photo-thumbs');
  const hidden = row.querySelector('.clue-photo-data');
  const errorMsg = row.querySelector('.photo-error');
  const qrToggle = row.querySelector('.qr-toggle');
  const qrBox = row.querySelector('.qr-canvas-box');
  const codeField = row.querySelector('.clue-code');
  if(qrToggle){
    qrToggle.onclick = () => {
      const isHidden = qrBox.style.display === 'none' || !qrBox.style.display;
      if(isHidden){
        const codeVal = codeField.value.trim();
        if(!codeVal){
          qrBox.style.display = 'block';
          qrBox.innerHTML = '<p class="hint">Enter a code above first.</p>';
          qrToggle.textContent = 'Hide QR';
          return;
        }
        qrBox.innerHTML = '';
        if(typeof QRCode !== 'undefined'){
          new QRCode(qrBox, { text: codeVal, width: 110, height: 110, correctLevel: QRCode.CorrectLevel.M });
        } else {
          qrBox.innerHTML = '<p class="hint">QR generator failed to load.</p>';
        }
        qrBox.style.display = 'block';
        qrToggle.textContent = 'Hide QR';
      } else {
        qrBox.style.display = 'none';
        qrToggle.textContent = 'Show QR to print';
      }
    };
  }

  function getPhotos(){
    try{ return JSON.parse(hidden.value || '[]'); }catch(e){ return []; }
  }
  function renderThumbs(){
    const photos = getPhotos();
    thumbsBox.innerHTML = photos.map((src, idx) => `
      <div class="photo-thumb-wrap" data-idx="${idx}">
        <img class="photo-preview" src="${src}" alt="">
        <button type="button" class="photo-thumb-remove" data-idx="${idx}" title="Remove">&times;</button>
      </div>
    `).join('');
    thumbsBox.querySelectorAll('.photo-thumb-remove').forEach(btn => {
      btn.onclick = () => {
        const photos2 = getPhotos();
        photos2.splice(parseInt(btn.getAttribute('data-idx'), 10), 1);
        hidden.value = JSON.stringify(photos2);
        renderThumbs();
      };
    });
  }
  renderThumbs();

  photoBtn.onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    const files = Array.from(fileInput.files || []);
    if(!files.length) return;
    errorMsg.style.display = 'none';
    const photos = getPhotos();
    try{
      for(const file of files){
        const dataUrl = await compressImage(file);
        photos.push(dataUrl);
      }
      hidden.value = JSON.stringify(photos);
      renderThumbs();
    }catch(e){
      errorMsg.textContent = 'Could not process one of those images, try again.';
      errorMsg.style.display = 'block';
    }
    fileInput.value = '';
  };
}

let activeStream = null;
let scanRAF = null;

function stopScanner(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if(activeStream){
    activeStream.getTracks().forEach(t => t.stop());
    activeStream = null;
  }
  const panel = document.getElementById('scanner-panel');
  if(panel) panel.innerHTML = '';
}

async function startScanner(onDetect){
  stopScanner();
  const panel = document.getElementById('scanner-panel');
  if(!panel) return;
  panel.innerHTML = `
    <div class="scanner-wrap">
      <video id="scanner-video" playsinline muted></video>
      <div class="scanner-frame"></div>
    </div>
    <p class="scanner-status" id="scanner-status">Point your camera at the printed code.</p>
    <button class="btn-ghost" id="scanner-cancel" style="margin-top:10px;">Cancel scan</button>
  `;
  document.getElementById('scanner-cancel').onclick = () => stopScanner();

  if(typeof jsQR === 'undefined'){
    document.getElementById('scanner-status').textContent = 'Scanner failed to load. Type the code instead.';
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById('scanner-status').textContent = 'Camera access isn\'t supported on this browser. Type the code instead.';
    return;
  }
  try{
    activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  }catch(e){
    document.getElementById('scanner-status').textContent = 'Camera permission was denied. Type the code instead.';
    return;
  }
  const video = document.getElementById('scanner-video');
  if(!video || !activeStream) return;
  video.srcObject = activeStream;
  try{ await video.play(); }catch(e){}

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  function tick(){
    if(!activeStream) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const result = jsQR(imageData.data, imageData.width, imageData.height);
      if(result && result.data){
        const found = result.data;
        stopScanner();
        onDetect(found);
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

(async () => {
  await restoreSession();
  render();
})();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Case File — Storyline Hunt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  :root{
    --bg:#0E1013;
    --card:#181B20;
    --card-raised:#1F232A;
    --hairline:rgba(198,161,91,0.16);
    --accent:#C6A15B;
    --accent-dim:#8F7239;
    --danger:#B0453F;
    --success:#4C7A5A;
    --text:#EDE9DF;
    --text-dim:#9A9C9C;
    --text-faint:#5C5F5F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 600px at 50% -10%, rgba(198,161,91,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 20px 80px;
  }
  .stage{width:100%;max-width:560px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent-dim);
    margin:0 0 6px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:38px;
    margin:0 0 4px;
    color:var(--text);
  }
  .sub{color:var(--text-dim);font-size:14.5px;margin:0 0 32px;line-height:1.5;}
  .folder{
    background:var(--card);
    border:1px solid var(--hairline);
    border-radius:3px;
    padding:32px 30px;
    position:relative;
  }
  .folder::before{
    content:'';
    position:absolute;
    top:0;left:24px;
    width:64px;height:5px;
    background:var(--card-raised);
    border:1px solid var(--hairline);
    border-top:none;
    border-radius:0 0 4px 4px;
  }
  .row{display:flex;gap:12px;}
  button{
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:14.5px;
    cursor:pointer;
    border-radius:2px;
    transition:background .15s ease, transform .1s ease;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{
    background:var(--accent);
    color:#26200F;
    border:1px solid var(--accent);
    padding:12px 20px;
    width:100%;
  }
  .btn-primary:hover{background:#D4AE68;}
  .btn-primary:disabled{opacity:0.45;cursor:default;}
  .btn-ghost{
    background:transparent;
    color:var(--text-dim);
    border:1px solid var(--hairline);
    padding:12px 20px;
    width:100%;
  }
  .btn-ghost:hover{border-color:var(--accent-dim);color:var(--text);}
  .btn-link{
    background:none;border:none;color:var(--accent-dim);
    font-size:13px;text-decoration:underline;padding:0;width:auto;
  }
  input[type=text],input[type=password]{
    width:100%;
    background:#101216;
    border:1px solid var(--hairline);
    color:var(--text);
    padding:12px 14px;
    border-radius:2px;
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;
    letter-spacing:0.03em;
    margin-bottom:14px;
    outline:none;
  }
  input:focus{border-color:var(--accent);}
  label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin-bottom:8px;
  }
  .clue-box{
    background:var(--card-raised);
    border-left:2px solid var(--accent);
    padding:20px 22px;
    margin-bottom:22px;
    font-family:'Cormorant Garamond',serif;
    font-size:20px;
    line-height:1.55;
    color:var(--text);
  }
  .clue-box .tag{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent-dim);
    margin-bottom:10px;
  }
  .dots{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--card-raised);border:1px solid var(--hairline);
  }
  .dot.filled{background:var(--accent);border-color:var(--accent);}
  .error-msg{
    color:var(--danger);font-size:13px;margin:-6px 0 14px;
    font-family:'IBM Plex Mono',monospace;
  }
  .notice-msg{
    color:var(--success);font-size:13px;margin:-6px 0 14px;
    font-family:'IBM Plex Mono',monospace;
  }
  .finished{
    text-align:center;
    padding:20px 0 6px;
  }
  .back{
    background:none;border:none;color:var(--text-faint);
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    margin-bottom:18px;padding:0;width:auto;cursor:pointer;
  }
  .back:hover{color:var(--accent-dim);}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px;}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--hairline);}
  th{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--text-faint);font-weight:400;
  }
  td{color:var(--text-dim);}
  .clue-row{
    background:var(--card-raised);
    border:1px solid var(--hairline);
    border-radius:2px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .clue-row-top{display:flex;gap:8px;margin-bottom:8px;}
  .clue-row-top input{margin-bottom:0;}
  .clue-row-top .clue-name{flex:1.1;}
  .clue-row-top .clue-code{flex:1;}
  .icon-btn{
    background:transparent;border:1px solid var(--hairline);
    color:var(--text-dim);width:38px;flex:none;padding:0;
  }
  .icon-btn:hover{border-color:var(--danger);color:var(--danger);}
  .photo-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .photo-row .btn-ghost{width:auto;padding:8px 14px;font-size:13px;}
  .photo-preview{
    width:44px;height:44px;object-fit:cover;border-radius:2px;
    border:1px solid var(--hairline);
  }
  .clue-photo{
    max-width:100%;
    height:auto;
    object-fit:contain;
    border-radius:2px;
    margin:12px 0 4px;
    display:block;
  }
  .clue-location{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:var(--text-dim);margin:0 0 4px;
  }
  textarea{
    width:100%;background:#101216;border:1px solid var(--hairline);
    color:var(--text);padding:10px 12px;border-radius:2px;
    font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;
    resize:vertical;min-height:56px;outline:none;margin-bottom:0;
  }
  textarea:focus{border-color:var(--accent);}
  .section-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    letter-spacing:0.12em;text-transform:uppercase;
    color:var(--accent-dim);margin:26px 0 12px;
  }
  .hint{color:var(--text-faint);font-size:12.5px;margin:6px 0 0;}
  .scanner-wrap{
    margin-top:14px;
    border:1px solid var(--hairline);
    border-radius:2px;
    overflow:hidden;
    background:#000;
    position:relative;
  }
  .scanner-wrap video{
    width:100%;
    display:block;
    max-height:280px;
    object-fit:cover;
  }
  .scanner-frame{
    position:absolute;
    inset:14%;
    border:2px solid var(--accent);
    border-radius:6px;
    pointer-events:none;
  }
  .scanner-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--text-dim);
    padding:10px 4px 0;
  }
  .qr-preview{
    display:flex;align-items:center;gap:12px;margin-top:10px;
  }
  .qr-canvas-box{
    background:#fff;padding:6px;border-radius:2px;line-height:0;
  }
</style>
</head>
<body>
<div class="stage" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- PASTE YOUR FIREBASE CONFIG HERE (see README for setup steps) ----
const firebaseConfig = {
  apiKey: "AIzaSyCcTiO7bWsVoYgSFIKavKQwAybeygc7v7k",
  authDomain: "treasurehunt-5bfd5.firebaseapp.com",
  projectId: "treasurehunt-5bfd5",
  storageBucket: "treasurehunt-5bfd5.firebasestorage.app",
  messagingSenderId: "613241168579",
  appId: "1:613241168579:web:2b1ea815a054083b7cb876"
};
// ------------------------------------------------------------------

const NEEDS_SETUP = firebaseConfig.apiKey === "YOUR_API_KEY";
let db = null;
if(!NEEDS_SETUP){
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
}

let state = { view: 'role', team: null, error: '', adminUnlocked: false, showHistory: false, notice: '' };

function slugify(name){
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'team';
}

async function getConfig(){
  const fallback = { title: 'The Case File', intro: 'A trail of coded evidence awaits. Enter the first code to begin.', pin: '1234', clues: [] };
  if(!db) return fallback;
  try{
    const snap = await getDoc(doc(db,'config','main'));
    const base = snap.exists() ? snap.data() : {};
    const cluesSnap = await getDocs(query(collection(db,'clues'), orderBy('order')));
    const clues = cluesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    return {
      title: base.title || fallback.title,
      intro: base.intro || fallback.intro,
      pin: base.pin || fallback.pin,
      clues
    };
  }catch(e){
    return fallback;
  }
}
async function saveConfig(cfg, previousClueIds){
  const rows = cfg.clues || [];
  const writes = [];
  const keptIds = new Set();
  rows.forEach((c, i) => {
    const data = { name: c.name||'', code: c.code||'', location: c.location||'', text: c.text||'', photo: c.photo||'', order: i };
    let ref;
    if(c.id){
      ref = doc(db,'clues', c.id);
    } else {
      ref = doc(collection(db,'clues'));
    }
    keptIds.add(ref.id);
    writes.push(setDoc(ref, data));
  });
  (previousClueIds || []).forEach(id => {
    if(!keptIds.has(id)) writes.push(deleteDoc(doc(db,'clues', id)));
  });
  writes.push(setDoc(doc(db,'config','main'), { title: cfg.title, intro: cfg.intro, pin: cfg.pin }));
  await Promise.all(writes);
}
async function getTeam(slug){
  if(!db) return null;
  try{
    const snap = await getDoc(doc(db,'teams',slug));
    return snap.exists() ? snap.data() : null;
  }catch(e){ return null; }
}
async function saveTeam(slug, data){
  if(!db) return;
  await setDoc(doc(db,'teams',slug), data);
}
async function getAllTeams(){
  if(!db) return [];
  try{
    const snap = await getDocs(collection(db,'teams'));
    return snap.docs.map(d => ({ slug: d.id, ...d.data() }));
  }catch(e){ return []; }
}
async function deleteTeam(slug){
  if(!db) return;
  try{ await deleteDoc(doc(db,'teams',slug)); }catch(e){}
}

function render(){
  const app = document.getElementById('app');
  if(NEEDS_SETUP){ app.innerHTML = viewSetupNeeded(); return; }
  if(state.view === 'role') app.innerHTML = viewRole();
  else if(state.view === 'join') app.innerHTML = viewJoin();
  else if(state.view === 'play') renderPlay();
  else if(state.view === 'adminGate') app.innerHTML = viewAdminGate();
  else if(state.view === 'admin') renderAdmin();
  bindGlobal();
}

function viewSetupNeeded(){
  return `
    <p class="eyebrow">Setup needed</p>
    <h1>Connect a backend first</h1>
    <p class="sub">This app needs a free Firebase project so team progress can save and sync. See the README that came with this file for step-by-step setup — then paste your config into the firebaseConfig object near the top of the &lt;script&gt; tag.</p>
    <div class="folder">
      <p class="hint">Steps: create a Firebase project → enable Firestore → create a web app → copy the config object → paste it in place of the placeholder values in this file → set Firestore rules to allow read/write → redeploy.</p>
    </div>
  `;
}

function bindGlobal(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = () => { stopScanner(); state.view = el.getAttribute('data-nav'); state.error=''; state.notice=''; state.showHistory=false; render(); };
  });
}

function viewRole(){
  return `
    <p class="eyebrow">Storyline hunt</p>
    <h1>The Case File</h1>
    <p class="sub">Enter codes found around the venue to unlock the next part of the story.</p>
    <div class="folder">
      <div class="row" style="margin-bottom:12px;">
        <button class="btn-primary" data-nav="join">Join as a team</button>
      </div>
      <div class="row">
        <button class="btn-ghost" data-nav="adminGate">Admin</button>
      </div>
    </div>
  `;
}

function viewJoin(){
  return `
    <button class="back" data-nav="role">&larr; back</button>
    <p class="eyebrow">Step 1</p>
    <h1>Name your team</h1>
    <p class="sub">If your team already started, enter the same name to continue where you left off.</p>
    <div class="folder">
      <label>Team name</label>
      <input type="text" id="team-name" placeholder="e.g. The Falcons" autofocus>
      ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
      <button class="btn-primary" id="join-btn">Enter the hunt</button>
    </div>
  `;
}

document.addEventListener('click', async (e) => {
  if(e.target && e.target.id === 'join-btn'){
    const nameInput = document.getElementById('team-name');
    const name = nameInput.value.trim();
    if(!name){ state.error = 'Enter a team name to continue.'; render(); return; }
    const slug = slugify(name);
    let team = await getTeam(slug);
    if(!team){
      team = { name, found: [], history: [], startedAt: Date.now(), finishedAt: null };
      await saveTeam(slug, team);
    }
    state.team = { slug, ...team };
    state.view = 'play';
    state.error = '';
    render();
  }
});

async function renderPlay(){
  stopScanner();
  const app = document.getElementById('app');
  const cfg = await getConfig();
  const clues = cfg.clues || [];
  const team = state.team;
  team.found = team.found || [];
  const total = clues.length;
  const doneCount = team.found.length;
  const finished = total > 0 && doneCount >= total;

  const dots = clues.map(c => `<div class="dot ${team.found.includes(c.id) ? 'filled':''}"></div>`).join('');

  if(state.showHistory){
    const found = clues.filter(c => team.found.includes(c.id));
    const historyHtml = found.length
      ? found.map(c => `
          <div class="clue-box">
            <span class="tag">${escapeHtml(c.name || 'Clue')}</span>
            ${renderClueBody(c)}
          </div>
        `).join('')
      : `<p class="hint">No clues found yet — enter a code to begin.</p>`;

    app.innerHTML = `
      <button class="back" data-nav="role">&larr; leave</button>
      <p class="eyebrow">Team file</p>
      <h1>${escapeHtml(team.name)}</h1>
      <p class="sub">${found.length} clue${found.length===1?'':'s'} found so far.</p>
      <button class="btn-ghost" id="back-to-hunt" style="margin-bottom:20px;">&larr; Back to hunt</button>
      ${historyHtml}
    `;
    bindGlobal();
    document.getElementById('back-to-hunt').onclick = () => { state.showHistory = false; renderPlay(); };
    return;
  }

  const mainHtml = `
    <label>Enter a code</label>
    <input type="text" id="code-input" placeholder="Type the code here" autofocus>
    ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
    ${state.notice ? `<div class="notice-msg">${escapeHtml(state.notice)}</div>` : ''}
    <div class="row">
      <button class="btn-primary" id="submit-code">Unlock clue</button>
      <button class="btn-ghost" id="scan-btn" style="flex:none;width:auto;padding:12px 18px;">Scan code</button>
    </div>
    <div id="scanner-panel"></div>
    ${doneCount === 0 && !finished ? `<p class="hint" style="margin-top:14px;">${escapeHtml(cfg.intro)}</p>` : ''}
    ${finished ? `<p class="hint" style="margin-top:14px;">You're caught up on every code released so far. Try a new one whenever it's announced.</p>` : ''}
  `;

  app.innerHTML = `
    <button class="back" data-nav="role">&larr; leave</button>
    <p class="eyebrow">Team file</p>
    <h1>${escapeHtml(team.name)}</h1>
    <p class="sub">${finished ? 'All current clues found.' : `${total - doneCount} clue${total-doneCount===1?'':'s'} remaining.`}</p>
    <div class="dots">${dots}</div>
    <div class="folder">${mainHtml}</div>
    <button class="btn-ghost" id="your-clues-btn" style="margin-top:16px;">Your clues (${doneCount})</button>
  `;
  bindGlobal();
  document.getElementById('your-clues-btn').onclick = () => { stopScanner(); state.showHistory = true; state.notice=''; renderPlay(); };

  const submitBtn = document.getElementById('submit-code');
  const scanBtn = document.getElementById('scan-btn');
  if(scanBtn){
    scanBtn.onclick = () => {
      startScanner((text) => {
        const input = document.getElementById('code-input');
        if(input) input.value = text;
        if(submitBtn) submitBtn.click();
      });
    };
  }
  if(submitBtn){
    submitBtn.onclick = async () => {
      const input = document.getElementById('code-input');
      const val = input.value.trim();
      state.notice = '';
      if(!val){ state.error = 'Enter a code first.'; renderPlay(); return; }
      const matched = clues.find(c => c.code && val.toLowerCase() === String(c.code).trim().toLowerCase());
      if(!matched){
        state.error = 'That code doesn\'t match any clue. Try again.';
        renderPlay();
        return;
      }
      if(team.found.includes(matched.id)){
        state.error = '';
        state.notice = 'You already unlocked this one — check Your clues to view it.';
        renderPlay();
        return;
      }
      team.found.push(matched.id);
      team.history = team.history || [];
      team.history.push({ code: val, clueId: matched.id, ts: Date.now() });
      if(team.found.length >= clues.length) team.finishedAt = Date.now();
      await saveTeam(team.slug, { name: team.name, found: team.found, history: team.history, startedAt: team.startedAt, finishedAt: team.finishedAt });
      state.team = team;
      state.error = '';
      state.notice = `Unlocked: ${matched.name || 'a new clue'}!`;
      renderPlay();
    };
    document.getElementById('code-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') submitBtn.click(); });
  }
}

function viewAdminGate(){
  return `
    <button class="back" data-nav="role">&larr; back</button>
    <p class="eyebrow">Restricted</p>
    <h1>Admin access</h1>
    <p class="sub">Enter the event pin to manage clues and view team progress.</p>
    <div class="folder">
      <label>Pin</label>
      <input type="password" id="pin-input" placeholder="Pin" autofocus>
      ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
      <button class="btn-primary" id="pin-submit">Unlock</button>
    </div>
  `;
}

document.addEventListener('click', async (e) => {
  if(e.target && e.target.id === 'pin-submit'){
    const cfg = await getConfig();
    const val = document.getElementById('pin-input').value;
    if(val === (cfg.pin || '1234')){
      state.view = 'admin';
      state.error = '';
      render();
    } else {
      state.error = 'Incorrect pin.';
      render();
    }
  }
});

let adminPollTimer = null;

async function renderAdmin(){
  const app = document.getElementById('app');
  const cfg = await getConfig();
  const teams = await getAllTeams();

  const clueRows = (cfg.clues || []).map((c,i) => buildClueRowHtml(c)).join('');

  const leaderboardRows = teams
    .sort((a,b) => ((b.found||[]).length) - ((a.found||[]).length))
    .map(t => `<tr><td>${escapeHtml(t.name||t.slug)}</td><td>${clueNamesFound(cfg.clues, t.found)}</td></tr>`)
    .join('') || `<tr><td colspan="2" style="color:var(--text-faint);">No teams yet.</td></tr>`;

  app.innerHTML = `
    <button class="back" data-nav="role">&larr; exit admin</button>
    <p class="eyebrow">Admin</p>
    <h1>Manage the hunt</h1>
    <p class="sub">Edit codes and clues, then save. Changes apply to all teams immediately.</p>

    <div class="section-title" style="margin-top:0;">Live leaderboard</div>
    <div class="folder">
      <table id="leaderboard-table">
        <tr><th>Team</th><th>Clues found</th></tr>
        ${leaderboardRows}
      </table>
    </div>

    <div class="section-title">Event details and clues</div>
    <div class="folder">
      <label>Event title</label>
      <input type="text" id="cfg-title" value="${escapeAttr(cfg.title)}">
      <label>Briefing text (shown before the first code)</label>
      <textarea id="cfg-intro" style="margin-bottom:14px;">${escapeHtml(cfg.intro)}</textarea>
      <label>Admin pin</label>
      <input type="text" id="cfg-pin" value="${escapeAttr(cfg.pin || '1234')}">

      <div class="section-title">Clues in order</div>
      <div id="clue-list">${clueRows}</div>
      <button class="btn-ghost" id="add-clue" style="margin-bottom:16px;">+ Add clue</button>

      <button class="btn-primary" id="save-cfg">Save changes</button>
      <p class="hint" id="save-msg"></p>
    </div>

    <div class="section-title">Reset event</div>
    <div class="folder">
      <p class="sub" style="margin-bottom:14px;">Clears all team progress. Clue list is kept.</p>
      <button class="btn-ghost" id="reset-event">Reset all team progress</button>
      <div id="reset-confirm" style="display:none;margin-top:12px;">
        <p class="hint" style="color:var(--danger);margin-bottom:10px;">This clears every team's progress and can't be undone. Are you sure?</p>
        <div class="row">
          <button class="btn-primary" id="reset-confirm-yes" style="background:var(--danger);border-color:var(--danger);color:#EDE9DF;">Yes, reset everyone</button>
          <button class="btn-ghost" id="reset-confirm-no">Cancel</button>
        </div>
      </div>
      <p class="hint" id="reset-msg"></p>
    </div>
  `;
  bindGlobal();
  bindAdminActions(cfg);

  if(adminPollTimer) clearInterval(adminPollTimer);
  adminPollTimer = setInterval(refreshLeaderboardOnly, 6000);
}

async function refreshLeaderboardOnly(){
  if(state.view !== 'admin') return;
  const table = document.getElementById('leaderboard-table');
  if(!table) return;
  const cfg = await getConfig();
  const teams = await getAllTeams();
  const total = (cfg.clues||[]).length || 1;
  const rows = teams
    .sort((a,b) => ((b.found||[]).length) - ((a.found||[]).length))
    .map(t => `<tr><td>${escapeHtml(t.name||t.slug)}</td><td>${clueNamesFound(cfg.clues, t.found)}</td></tr>`)
    .join('') || `<tr><td colspan="2" style="color:var(--text-faint);">No teams yet.</td></tr>`;
  table.innerHTML = `<tr><th>Team</th><th>Clues found</th></tr>${rows}`;
}

function clueNamesFound(clues, foundIds){
  clues = clues || [];
  foundIds = foundIds || [];
  const found = clues.filter(c => foundIds.includes(c.id)).map(c => escapeHtml(c.name || c.code || 'Clue'));
  return found.length ? found.join(', ') : '<span style="color:var(--text-faint);">None yet</span>';
}

function buildClueRowHtml(c){
  c = c || {};
  return `
    <div class="clue-row" data-id="${escapeAttr(c.id||'')}">
      <div class="clue-row-top">
        <input type="text" class="clue-name" value="${escapeAttr(c.name||'')}" placeholder="Clue name">
        <input type="text" class="clue-code" value="${escapeAttr(c.code||'')}" placeholder="Code">
        <button class="icon-btn move-up" title="Move up">&uarr;</button>
        <button class="icon-btn move-down" title="Move down">&darr;</button>
        <button class="icon-btn remove-clue" title="Remove">&times;</button>
      </div>
      <input type="text" class="clue-location" value="${escapeAttr(c.location||'')}" placeholder="Location (where this code is found)">
      <textarea class="clue-text" placeholder="Clue text revealed when this code is entered">${escapeHtml(c.text||'')}</textarea>
      <div class="qr-preview">
        <button type="button" class="btn-ghost qr-toggle" style="width:auto;padding:8px 14px;font-size:13px;">Show QR to print</button>
        <div class="qr-canvas-box" style="display:none;"></div>
      </div>
      <div class="photo-row">
        <input type="file" accept="image/*" class="clue-photo-input" style="display:none;">
        <button type="button" class="btn-ghost photo-btn">${c.photo ? 'Change photo' : 'Add photo'}</button>
        <button type="button" class="icon-btn remove-photo" style="${c.photo ? '' : 'display:none;'}" title="Remove photo">&times;</button>
        <img class="photo-preview" src="${c.photo||''}" style="${c.photo ? '' : 'display:none;'}" alt="">
      </div>
      <p class="hint photo-error" style="color:var(--danger);display:none;"></p>
      <input type="hidden" class="clue-photo-data" value="${escapeAttr(c.photo||'')}">
    </div>
  `;
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('read failed'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('image load failed'));
      img.onload = () => {
        const maxW = 900;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function bindAdminActions(cfg){
  document.getElementById('add-clue').onclick = () => {
    const list = document.getElementById('clue-list');
    const div = document.createElement('div');
    div.innerHTML = buildClueRowHtml({});
    const row = div.firstElementChild;
    list.appendChild(row);
    attachRowHandlers(row);
  };
  document.querySelectorAll('.clue-row').forEach(attachRowHandlers);

  document.getElementById('save-cfg').onclick = async () => {
    const newClues = Array.from(document.querySelectorAll('.clue-row')).map(row => ({
      id: row.getAttribute('data-id') || null,
      name: row.querySelector('.clue-name').value.trim(),
      code: row.querySelector('.clue-code').value.trim(),
      location: row.querySelector('.clue-location').value.trim(),
      text: row.querySelector('.clue-text').value.trim(),
      photo: row.querySelector('.clue-photo-data').value || ''
    })).filter(c => c.code);
    const newCfg = {
      title: document.getElementById('cfg-title').value.trim() || 'The Case File',
      intro: document.getElementById('cfg-intro').value.trim(),
      pin: document.getElementById('cfg-pin').value.trim() || '1234',
      clues: newClues
    };
    const previousClueIds = (cfg.clues || []).map(c => c.id).filter(Boolean);
    try{
      await saveConfig(newCfg, previousClueIds);
      document.getElementById('save-msg').textContent = 'Saved.';
      await renderAdmin();
      const msgEl = document.getElementById('save-msg');
      if(msgEl) msgEl.textContent = 'Saved.';
    }catch(e){
      document.getElementById('save-msg').textContent = 'Save failed, try again — photos may be too large, or check your Firestore rules.';
    }
  };

  document.getElementById('reset-event').onclick = () => {
    document.getElementById('reset-confirm').style.display = 'block';
  };
  document.getElementById('reset-confirm-no').onclick = () => {
    document.getElementById('reset-confirm').style.display = 'none';
  };
  document.getElementById('reset-confirm-yes').onclick = async () => {
    const teams = await getAllTeams();
    await Promise.all(teams.map(t => deleteTeam(t.slug)));
    document.getElementById('reset-confirm').style.display = 'none';
    document.getElementById('reset-msg').textContent = 'All team progress cleared.';
    refreshLeaderboardOnly();
  };
}

function attachRowHandlers(row){
  row.querySelector('.remove-clue').onclick = () => row.remove();
  row.querySelector('.move-up').onclick = () => {
    const prev = row.previousElementSibling;
    if(prev) row.parentNode.insertBefore(row, prev);
  };
  row.querySelector('.move-down').onclick = () => {
    const next = row.nextElementSibling;
    if(next) row.parentNode.insertBefore(next, row);
  };
  const fileInput = row.querySelector('.clue-photo-input');
  const photoBtn = row.querySelector('.photo-btn');
  const removeBtn = row.querySelector('.remove-photo');
  const preview = row.querySelector('.photo-preview');
  const hidden = row.querySelector('.clue-photo-data');
  const errorMsg = row.querySelector('.photo-error');
  const qrToggle = row.querySelector('.qr-toggle');
  const qrBox = row.querySelector('.qr-canvas-box');
  const codeField = row.querySelector('.clue-code');
  if(qrToggle){
    qrToggle.onclick = () => {
      const isHidden = qrBox.style.display === 'none' || !qrBox.style.display;
      if(isHidden){
        const codeVal = codeField.value.trim();
        if(!codeVal){
          qrBox.style.display = 'block';
          qrBox.innerHTML = '<p class="hint">Enter a code above first.</p>';
          qrToggle.textContent = 'Hide QR';
          return;
        }
        qrBox.innerHTML = '';
        if(typeof QRCode !== 'undefined'){
          new QRCode(qrBox, { text: codeVal, width: 110, height: 110, correctLevel: QRCode.CorrectLevel.M });
        } else {
          qrBox.innerHTML = '<p class="hint">QR generator failed to load.</p>';
        }
        qrBox.style.display = 'block';
        qrToggle.textContent = 'Hide QR';
      } else {
        qrBox.style.display = 'none';
        qrToggle.textContent = 'Show QR to print';
      }
    };
  }
  photoBtn.onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if(!file) return;
    errorMsg.style.display = 'none';
    try{
      const dataUrl = await compressImage(file);
      hidden.value = dataUrl;
      preview.src = dataUrl;
      preview.style.display = '';
      removeBtn.style.display = '';
      photoBtn.textContent = 'Change photo';
    }catch(e){
      errorMsg.textContent = 'Could not process that image, try another file.';
      errorMsg.style.display = 'block';
    }
  };
  removeBtn.onclick = () => {
    hidden.value = '';
    preview.src = '';
    preview.style.display = 'none';
    removeBtn.style.display = 'none';
    photoBtn.textContent = 'Add photo';
  };
}

function renderClueBody(clue){
  return `
    ${clue.location ? `<span class="clue-location">Found at: ${escapeHtml(clue.location)}</span>` : ''}
    ${clue.photo ? `<img class="clue-photo" src="${clue.photo}" alt="">` : ''}
    <div>${escapeHtml(clue.text)}</div>
  `;
}

let activeStream = null;
let scanRAF = null;

function stopScanner(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if(activeStream){
    activeStream.getTracks().forEach(t => t.stop());
    activeStream = null;
  }
  const panel = document.getElementById('scanner-panel');
  if(panel) panel.innerHTML = '';
}

async function startScanner(onDetect){
  stopScanner();
  const panel = document.getElementById('scanner-panel');
  if(!panel) return;
  panel.innerHTML = `
    <div class="scanner-wrap">
      <video id="scanner-video" playsinline muted></video>
      <div class="scanner-frame"></div>
    </div>
    <p class="scanner-status" id="scanner-status">Point your camera at the printed code.</p>
    <button class="btn-ghost" id="scanner-cancel" style="margin-top:10px;">Cancel scan</button>
  `;
  document.getElementById('scanner-cancel').onclick = () => stopScanner();

  if(typeof jsQR === 'undefined'){
    document.getElementById('scanner-status').textContent = 'Scanner failed to load. Type the code instead.';
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById('scanner-status').textContent = 'Camera access isn\'t supported on this browser. Type the code instead.';
    return;
  }
  try{
    activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  }catch(e){
    document.getElementById('scanner-status').textContent = 'Camera permission was denied. Type the code instead.';
    return;
  }
  const video = document.getElementById('scanner-video');
  if(!video || !activeStream) return;
  video.srcObject = activeStream;
  try{ await video.play(); }catch(e){}

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  function tick(){
    if(!activeStream) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const result = jsQR(imageData.data, imageData.width, imageData.height);
      if(result && result.data){
        const found = result.data;
        stopScanner();
        onDetect(found);
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

render();
</script>

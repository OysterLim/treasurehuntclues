<body>
<div class="stage" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---- PASTE YOUR FIREBASE CONFIG HERE (see README for setup steps) ----
const firebaseConfig = {
  apiKey: "AIzaSyCcTiO7bWsVoYgSFIKavKQwAybeygc7v7k",
  authDomain: "treasurehunt-5bfd5.firebaseapp.com",
  projectId: "treasurehunt-5bfd5",
  storageBucket: "treasurehunt-5bfd5.firebasestorage.app",
  messagingSenderId: "613241168579",
  appId: "1:613241168579:web:2b1ea815a054083b7cb876"
};
// ------------------------------------------------------------------

const NEEDS_SETUP = firebaseConfig.apiKey === "YOUR_API_KEY";
let db = null;
if(!NEEDS_SETUP){
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
}

let state = { view: 'role', team: null, error: '', adminUnlocked: false, notice: '', pendingCodeValue: '', adminTab: 'leaderboard', teamTab: 'hunt' };

const SESSION_KEY = 'clue-hunt-session';
function persistTeamSession(slug){
  try{ localStorage.setItem(SESSION_KEY, slug); }catch(e){}
}
function clearTeamSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}
async function restoreSession(){
  let savedSlug = null;
  try{ savedSlug = localStorage.getItem(SESSION_KEY); }catch(e){}
  if(!savedSlug) return;
  try{
    const team = await getTeam(savedSlug);
    if(team){
      state.team = { slug: savedSlug, ...team };
      state.view = 'play';
    } else {
      clearTeamSession();
    }
  }catch(e){
    // Network hiccup on load — just fall back to the normal join screen.
  }
}

function slugify(name){
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'team';
}

function toDatetimeLocalValue(ms){
  if(!ms) return '';
  const d = new Date(ms);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

let configCache = null;
let configCacheAt = 0;
const CONFIG_CACHE_MS = 20000;

async function getConfig(forceFresh){
  const fallback = { title: 'The Case File', intro: 'A trail of coded evidence awaits. Enter the first code to begin.', pin: '1234', clues: [], eventStart: null, eventEnd: null };
  if(!db) return fallback;
  if(!forceFresh && configCache && (Date.now() - configCacheAt) < CONFIG_CACHE_MS){
    return configCache;
  }
  try{
    const [snap, cluesSnap] = await Promise.all([
      getDoc(doc(db,'config','main')),
      getDocs(query(collection(db,'clues'), orderBy('order')))
    ]);
    const base = snap.exists() ? snap.data() : {};
    const clues = cluesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const result = {
      title: base.title || fallback.title,
      intro: base.intro || fallback.intro,
      pin: base.pin || fallback.pin,
      eventStart: base.eventStart || null,
      eventEnd: base.eventEnd || null,
      clues
    };
    configCache = result;
    configCacheAt = Date.now();
    return result;
  }catch(e){
    return configCache || fallback;
  }
}
function invalidateConfigCache(){
  configCache = null;
}
async function saveConfig(cfg, previousClueIds){
  const rows = cfg.clues || [];
  const writes = [];
  const keptIds = new Set();
  rows.forEach((c, i) => {
    const data = { name: c.name||'', code: c.code||'', location: c.location||'', text: c.text||'', photos: c.photos||[], order: i };
    let ref;
    if(c.id){
      ref = doc(db,'clues', c.id);
    } else {
      ref = doc(collection(db,'clues'));
    }
    keptIds.add(ref.id);
    writes.push(setDoc(ref, data));
  });
  (previousClueIds || []).forEach(id => {
    if(!keptIds.has(id)) writes.push(deleteDoc(doc(db,'clues', id)));
  });
  writes.push(setDoc(doc(db,'config','main'), { title: cfg.title, intro: cfg.intro, pin: cfg.pin, eventStart: cfg.eventStart || null, eventEnd: cfg.eventEnd || null }));
  await Promise.all(writes);
}
async function getTeam(slug){
  if(!db) return null;
  const snap = await getDoc(doc(db,'teams',slug));
  return snap.exists() ? snap.data() : null;
}
async function saveTeam(slug, data){
  if(!db) return;
  await setDoc(doc(db,'teams',slug), data);
}
async function getAllTeams(){
  if(!db) return [];
  try{
    const snap = await getDocs(collection(db,'teams'));
    return snap.docs.map(d => ({ slug: d.id, ...d.data() }));
  }catch(e){ return []; }
}
async function deleteTeam(slug){
  if(!db) return;
  try{ await deleteDoc(doc(db,'teams',slug)); }catch(e){}
}

function render(){
  const app = document.getElementById('app');
  document.body.classList.remove('has-tabbar');
  if(NEEDS_SETUP){ app.innerHTML = viewSetupNeeded(); return; }
  if(state.view === 'role') renderRole();
  else if(state.view === 'join') app.innerHTML = viewJoin();
  else if(state.view === 'play') renderPlay();
  else if(state.view === 'adminGate') app.innerHTML = viewAdminGate();
  else if(state.view === 'admin') renderAdmin();
  bindGlobal();
}

function viewSetupNeeded(){
  return `
    <div class="screen-fade">
      <p class="eyebrow">Setup needed</p>
      <h1>Connect a backend first</h1>
      <p class="sub">This app needs a free Firebase project so team progress can save and sync. See the README that came with this file for step-by-step setup — then paste your config into the firebaseConfig object near the top of the &lt;script&gt; tag.</p>
      <div class="folder">
        <p class="hint">Steps: create a Firebase project → enable Firestore → create a web app → copy the config object → paste it in place of the placeholder values in this file → set Firestore rules to allow read/write → redeploy.</p>
      </div>
    </div>
  `;
}

function bindGlobal(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = () => {
      stopScanner();
      clearCountdownTimer();
      const target = el.getAttribute('data-nav');
      if(target === 'role'){ clearTeamSession(); }
      state.view = target; state.error=''; state.notice=''; state.pendingCodeValue=''; state.teamTab='hunt'; render();
    };
  });
}

async function renderRole(){
  stopScanner();
  clearCountdownTimer();
  const app = document.getElementById('app');
  const cfg = await getConfig();
  const now = Date.now();
  const notStarted = !!(cfg.eventStart && now < cfg.eventStart);
  const ended = !!(cfg.eventEnd && now > cfg.eventEnd);
  const joinBlocked = notStarted || ended;

  app.innerHTML = `
    <div class="screen-fade">
      <p class="eyebrow">Storyline hunt</p>
      <h1>The Case File</h1>
      <p class="sub">Enter codes found around the venue to unlock the next part of the story.</p>
      <div class="folder">
        <div class="row" style="margin-bottom:12px;">
          <button class="btn-primary" id="join-team-btn" ${joinBlocked ? 'disabled' : ''}>Join as a team</button>
        </div>
        <div class="row">
          <button class="btn-ghost" data-nav="adminGate">Admin</button>
        </div>
        ${notStarted ? `
          <p class="hint" style="margin-top:16px;">The hunt hasn't started yet — hang tight!</p>
          <p class="sub" id="countdown-display" style="font-family:'IBM Plex Mono',monospace;font-size:22px;color:var(--accent);margin-top:6px;"></p>
        ` : ''}
        ${ended ? `<p class="hint" style="margin-top:16px;">This hunt has ended. Contact your organizer for results.</p>` : ''}
      </div>
    </div>
  `;
  bindGlobal();

  const joinBtn = document.getElementById('join-team-btn');
  if(joinBtn && !joinBlocked){
    joinBtn.onclick = () => {
      state.view = 'join'; state.error=''; state.notice=''; state.pendingCodeValue=''; state.teamTab='hunt'; render();
    };
  }

  if(notStarted){
    startCountdown(cfg.eventStart, () => { renderRole(); });
  }
}

function viewJoin(){
  return `
    <div class="screen-fade">
      <button class="back" data-nav="role">&larr; back</button>
      <p class="eyebrow">Step 1</p>
      <h1>Enter your team details</h1>
      <p class="sub">Use the team name and password given by your organizer.</p>
      <div class="folder">
        <label>Team name</label>
        <input type="text" id="team-name" placeholder="e.g. The Falcons" autofocus>
        <label>Password</label>
        <input type="text" id="team-password" placeholder="Team password">
        ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
        <button class="btn-primary" id="join-btn">Enter the hunt</button>
      </div>
    </div>
  `;
}

document.addEventListener('click', async (e) => {
  if(e.target && e.target.id === 'join-btn'){
    const btn = e.target;
    const nameInput = document.getElementById('team-name');
    const passInput = document.getElementById('team-password');
    const name = nameInput.value.trim();
    const passwordVal = (passInput.value || '').trim();
    if(!name || !passwordVal){ state.error = 'Enter both your team name and password.'; render(); return; }
    const slug = slugify(name);
    btn.disabled = true;
    btn.textContent = 'Checking…';
    try{
      const team = await getTeam(slug);
      if(!team){ state.error = 'No team found with that name. Check the spelling, or check with your organizer.'; render(); return; }
      if((team.password || '') !== passwordVal){ state.error = 'That password doesn\'t match this team name.'; render(); return; }
      state.team = { slug, ...team };
      state.view = 'play';
      state.error = '';
      persistTeamSession(slug);
      render();
    }catch(err){
      state.error = 'Couldn\'t reach the server — check your internet connection and try again.';
      btn.disabled = false;
      btn.textContent = 'Enter the hunt';
      render();
    }
  }
});

function teamUnviewedCount(team){
  const found = (team && team.found) || [];
  const viewed = (team && team.viewedCount) || 0;
  return Math.max(0, found.length - viewed);
}

async function markCluesViewed(team){
  if(teamUnviewedCount(team) === 0) return;
  team.viewedCount = team.found.length;
  try{
    await saveTeam(team.slug, {
      name: team.name, password: team.password || '', found: team.found, history: team.history || [],
      startedAt: team.startedAt || null, finishedAt: team.finishedAt || null, viewedCount: team.viewedCount
    });
  }catch(e){}
}

async function renderPlay(){
  stopScanner();
  clearCountdownTimer();
  const app = document.getElementById('app');
  const cfg = await getConfig();
  const clues = cfg.clues || [];
  const team = state.team;
  team.found = team.found || [];
  const total = clues.length;
  const doneCount = team.found.length;
  const finished = total > 0 && doneCount >= total;
  const now = Date.now();
  const notStarted = !!(cfg.eventStart && now < cfg.eventStart);
  const ended = !!(cfg.eventEnd && now > cfg.eventEnd);

  if(notStarted){
    document.body.classList.remove('has-tabbar');
    app.innerHTML = `
      <div class="screen-fade">
        <button class="back" data-nav="role">&larr; leave</button>
        <p class="eyebrow">Team file</p>
        <h1>${escapeHtml(team.name)}</h1>
        <div class="folder">
          <p class="hint" style="margin-bottom:12px;">The hunt hasn't started yet — hang tight!</p>
          <p class="sub" id="countdown-display" style="font-family:'IBM Plex Mono',monospace;font-size:22px;color:var(--accent);"></p>
        </div>
      </div>
    `;
    bindGlobal();
    startCountdown(cfg.eventStart, () => { renderPlay(); });
    return;
  }

  const teamTab = state.teamTab || 'hunt';
  const dots = clues.map(c => `<div class="dot ${team.found.includes(c.id) ? 'filled':''}"></div>`).join('');
  const unviewed = teamUnviewedCount(team);

  let paneHtml;
  if(teamTab === 'clues'){
    const found = clues.filter(c => team.found.includes(c.id));
    paneHtml = found.length
      ? `<div class="clue-grid">${found.map((c, idx) => `
          <div class="clue-box">
            <span class="page-num">${idx+1}/${found.length}</span>
            <span class="tag">${escapeHtml(c.name || 'Clue')}</span>
            ${renderClueBody(c)}
          </div>
        `).join('')}</div>`
      : `<p class="hint">No clues found yet — enter a code on the Hunt tab to begin.</p>`;
  } else {
    const showStamp = state.notice && state.notice.indexOf('Unlocked: ') === 0;
    const noticeHtml = showStamp
      ? `<div class="unlock-stamp"><div class="stamp-ring">&#10003;</div><span class="stamp-label">Clue unlocked</span><span class="stamp-name">${escapeHtml(state.notice.replace('Unlocked: ','').replace(/!$/,''))}</span></div>`
      : (state.notice ? `<div class="notice-msg">${escapeHtml(state.notice)}</div>` : '');

    paneHtml = ended ? `
      <p class="hint">This hunt has ended — no more codes can be submitted. Check "Your Clues" to review what your team found.</p>
    ` : `
      <label>Enter a code</label>
      <input type="text" id="code-input" placeholder="Type the code here" value="${escapeAttr(state.pendingCodeValue || '')}" autofocus>
      ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
      ${noticeHtml}
      <div class="row">
        <button class="btn-primary" id="submit-code">Unlock clue</button>
        <button class="btn-ghost" id="scan-btn" style="flex:none;width:auto;padding:12px 18px;">Scan code</button>
      </div>
      <div id="scanner-panel"></div>
      ${doneCount === 0 && !finished ? `<p class="hint" style="margin-top:14px;">${escapeHtml(cfg.intro)}</p>` : ''}
      ${finished ? `<p class="hint" style="margin-top:14px;">You're caught up on every code released so far. Try a new one whenever it's announced.</p>` : ''}
    `;
  }

  document.body.classList.add('has-tabbar');
  app.innerHTML = `
    <div class="screen-fade">
      <button class="back" data-nav="role">&larr; leave</button>
      <p class="eyebrow">Team file</p>
      <h1>${escapeHtml(team.name)}</h1>
      <p class="sub">${ended ? 'Hunt has ended.' : finished ? 'All current clues found.' : `${total - doneCount} clue${total-doneCount===1?'':'s'} remaining.`}</p>
      <div class="dots">${dots}</div>
      <div class="folder">${paneHtml}</div>
    </div>

    <div class="app-tabbar">
      <button class="app-tab ${teamTab==='hunt'?'active':''}" data-team-tab="hunt">
        <span class="tab-icon">&#128273;</span>Hunt
      </button>
      <button class="app-tab ${teamTab==='clues'?'active':''}" data-team-tab="clues">
        <span class="tab-icon">&#128194;${unviewed > 0 ? `<span class="tab-badge">${unviewed}</span>` : ''}</span>Your Clues
      </button>
    </div>
  `;
  bindGlobal();

  document.querySelectorAll('[data-team-tab]').forEach(btn => {
    btn.onclick = async () => {
      stopScanner();
      const target = btn.getAttribute('data-team-tab');
      state.teamTab = target;
      state.error = '';
      if(target === 'clues'){
        state.notice = '';
        await markCluesViewed(team);
        state.team = team;
      }
      renderPlay();
    };
  });

  const submitBtn = document.getElementById('submit-code');
  const scanBtn = document.getElementById('scan-btn');
  if(scanBtn){
    scanBtn.onclick = () => {
      startScanner((text) => {
        const input = document.getElementById('code-input');
        if(input) input.value = text;
        if(submitBtn) submitBtn.click();
      });
    };
  }
  if(submitBtn){
    submitBtn.onclick = async () => {
      const input = document.getElementById('code-input');
      const val = input.value.trim();
      state.notice = '';
      if(!val){ state.error = 'Enter a code first.'; renderPlay(); return; }
      const matched = clues.find(c => c.code && val.toLowerCase() === String(c.code).trim().toLowerCase());
      if(!matched){
        state.error = 'That code doesn\'t match any clue. Try again.';
        state.pendingCodeValue = '';
        renderPlay();
        return;
      }
      if(team.found.includes(matched.id)){
        state.error = '';
        state.notice = 'You already unlocked this one — check Your Clues to view it.';
        state.pendingCodeValue = '';
        renderPlay();
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Checking…';
      const wasFirstFind = team.found.length === 0;
      team.found.push(matched.id);
      team.history = team.history || [];
      team.history.push({ code: val, clueId: matched.id, ts: Date.now() });
      if(wasFirstFind && !team.startedAt) team.startedAt = Date.now();
      if(team.found.length >= clues.length) team.finishedAt = Date.now();
      try{
        await saveTeam(team.slug, { name: team.name, password: team.password || '', found: team.found, history: team.history, startedAt: team.startedAt, finishedAt: team.finishedAt, viewedCount: team.viewedCount || 0 });
        state.team = team;
        state.error = '';
        state.pendingCodeValue = '';
        state.notice = `Unlocked: ${matched.name || 'a new clue'}!`;
        renderPlay();
      }catch(err){
        // Roll back the local change since it never actually saved.
        team.found.pop();
        team.history.pop();
        state.error = 'Couldn\'t save — check your connection and tap Unlock again.';
        state.pendingCodeValue = val;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Unlock clue';
        renderPlay();
      }
    };
    document.getElementById('code-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') submitBtn.click(); });
  }
}

function formatDuration(ms){
  if(ms == null || ms < 0) return '';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if(h > 0) return `${h}h ${m}m`;
  if(m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function teamTimeLabel(t){
  if(t.finishedAt && t.startedAt) return formatDuration(t.finishedAt - t.startedAt);
  if(t.startedAt) return 'In progress';
  return 'Not started';
}

function sortTeamsForLeaderboard(teams){
  return [...teams].sort((a, b) => {
    const countA = (a.found||[]).length;
    const countB = (b.found||[]).length;
    if(countB !== countA) return countB - countA;
    // Tie-break: finished teams rank by who finished first.
    if(a.finishedAt && b.finishedAt) return a.finishedAt - b.finishedAt;
    if(a.finishedAt && !b.finishedAt) return -1;
    if(!a.finishedAt && b.finishedAt) return 1;
    // Both still in progress with the same count — earlier last-find wins.
    const lastA = (a.history && a.history.length) ? a.history[a.history.length-1].ts : Infinity;
    const lastB = (b.history && b.history.length) ? b.history[b.history.length-1].ts : Infinity;
    return lastA - lastB;
  });
}

function buildLeaderboardRows(cfg, teams){
  const sorted = sortTeamsForLeaderboard(teams);
  return sorted
    .map(t => `<tr data-name="${escapeAttr((t.name||t.slug||'').toLowerCase())}"><td>${escapeHtml(t.name||t.slug)}</td><td>${clueNamesFound(cfg.clues, t.found)}</td><td>${teamTimeLabel(t)}</td></tr>`)
    .join('') || `<tr><td colspan="3" style="color:var(--text-faint);">No teams yet.</td></tr>`;
}

function clueNamesFound(clues, foundIds){
  clues = clues || [];
  foundIds = foundIds || [];
  const found = clues.filter(c => foundIds.includes(c.id)).map(c => escapeHtml(c.name || c.code || 'Clue'));
  return found.length ? found.join(', ') : '<span style="color:var(--text-faint);">None yet</span>';
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('read failed'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('image load failed'));
      img.onload = () => {
        const maxW = 720;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.65));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

        if(!name) return;
        const slug = slugify(name);
        newSlugs.add(slug);

        const data = {
          name,
          password,

      toRemove.forEach(t => writes.push(deleteTeam(t.slug)));
      saveTeamsBtn.disabled = true;
      saveTeamsBtn.textContent = 'Saving…';
      try{
        await Promise.all(writes);
        await renderAdmin();
        const msgEl = document.getElementById('teams-save-msg');
        if(msgEl) msgEl.textContent = 'Saved.';
      }catch(e){
        document.getElementById('teams-save-msg').textContent = 'Save failed — check your connection and try again.';
        saveTeamsBtn.disabled = false;
        saveTeamsBtn.textContent = 'Save teams';
      }
    };
  }

  const saveCluesBtn = document.getElementById('save-cfg');
  if(saveCluesBtn){
    saveCluesBtn.onclick = async () => {
      const newClues = Array.from(document.querySelectorAll('.clue-row')).map(row => ({
        id: row.getAttribute('data-id') || null,
        name: row.querySelector('.clue-name').value.trim(),
        code: row.querySelector('.clue-code').value.trim(),
        location: row.querySelector('.clue-location').value.trim(),
        text: row.querySelector('.clue-text').value.trim(),
        photos: (() => { try{ return JSON.parse(row.querySelector('.clue-photo-data').value || '[]'); }catch(e){ return []; } })()
      })).filter(c => c.code);
      const newCfg = {
        title: cfg.title,
        intro: cfg.intro,
        pin: cfg.pin,
        eventStart: cfg.eventStart || null,
        eventEnd: cfg.eventEnd || null,
        clues: newClues
      };
      const previousClueIds = (cfg.clues || []).map(c => c.id).filter(Boolean);
      saveCluesBtn.disabled = true;
      saveCluesBtn.textContent = 'Saving…';
      try{
        await saveConfig(newCfg, previousClueIds);
        invalidateConfigCache();
        await renderAdmin();
        const msgEl = document.getElementById('save-msg');
        if(msgEl) msgEl.textContent = 'Saved.';
      }catch(e){
        document.getElementById('save-msg').textContent = 'Save failed — photos may be too large, or check your connection.';
        saveCluesBtn.disabled = false;
        saveCluesBtn.textContent = 'Save changes';
      }
    };
  }

  const saveSettingsBtn = document.getElementById('save-cfg-settings');
  if(saveSettingsBtn){
    saveSettingsBtn.onclick = async () => {
      const startVal = document.getElementById('cfg-start').value;
      const endVal = document.getElementById('cfg-end').value;
      const newCfg = {
        title: document.getElementById('cfg-title').value.trim() || 'The Case File',
        intro: document.getElementById('cfg-intro').value.trim(),
        pin: document.getElementById('cfg-pin').value.trim() || '1234',
        eventStart: startVal ? new Date(startVal).getTime() : null,
        eventEnd: endVal ? new Date(endVal).getTime() : null,
        clues: cfg.clues || []
      };
      const previousClueIds = (cfg.clues || []).map(c => c.id).filter(Boolean);
      saveSettingsBtn.disabled = true;
      saveSettingsBtn.textContent = 'Saving…';
      try{
        await saveConfig(newCfg, previousClueIds);
        invalidateConfigCache();
        await renderAdmin();
        const msgEl = document.getElementById('save-msg-settings');
        if(msgEl) msgEl.textContent = 'Saved.';
      }catch(e){
        document.getElementById('save-msg-settings').textContent = 'Save failed — check your connection and try again.';
        saveSettingsBtn.disabled = false;
        saveSettingsBtn.textContent = 'Save changes';
      }
    };
  }

  const resetEventBtn = document.getElementById('reset-event');
  if(resetEventBtn){
    resetEventBtn.onclick = () => {
      document.getElementById('reset-confirm').style.display = 'block';
    };
    document.getElementById('reset-confirm-no').onclick = () => {
      document.getElementById('reset-confirm').style.display = 'none';
    };
    document.getElementById('reset-confirm-yes').onclick = async () => {
      const allTeams = await getAllTeams();
      await Promise.all(allTeams.map(t => saveTeam(t.slug, {
        name: t.name, password: t.password || '', found: [], history: [], startedAt: null, finishedAt: null, viewedCount: 0
      })));
      document.getElementById('reset-confirm').style.display = 'none';
      document.getElementById('reset-msg').textContent = 'All team progress cleared. Teams and passwords were kept.';
    };
  }
}

function attachRowHandlers(row){
  row.querySelector('.remove-clue').onclick = () => row.remove();
  row.querySelector('.move-up').onclick = () => {
    const prev = row.previousElementSibling;
    if(prev) row.parentNode.insertBefore(row, prev);
  };
  row.querySelector('.move-down').onclick = () => {
    const next = row.nextElementSibling;
    if(next) row.parentNode.insertBefore(next, row);
  };
  const fileInput = row.querySelector('.clue-photo-input');
  const photoBtn = row.querySelector('.photo-btn');
  const thumbsBox = row.querySelector('.photo-thumbs');
  const hidden = row.querySelector('.clue-photo-data');
  const errorMsg = row.querySelector('.photo-error');
  const qrToggle = row.querySelector('.qr-toggle');
  const qrBox = row.querySelector('.qr-canvas-box');
  const codeField = row.querySelector('.clue-code');
  if(qrToggle){
    qrToggle.onclick = () => {
      const isHidden = qrBox.style.display === 'none' || !qrBox.style.display;
      if(isHidden){
        const codeVal = codeField.value.trim();
        if(!codeVal){
          qrBox.style.display = 'block';
          qrBox.innerHTML = '<p class="hint">Enter a code above first.</p>';
          qrToggle.textContent = 'Hide QR';
          return;
        }
        qrBox.innerHTML = '';
        if(typeof QRCode !== 'undefined'){
          new QRCode(qrBox, { text: codeVal, width: 110, height: 110, correctLevel: QRCode.CorrectLevel.M });
        } else {
          qrBox.innerHTML = '<p class="hint">QR generator failed to load.</p>';
        }
        qrBox.style.display = 'block';
        qrToggle.textContent = 'Hide QR';
      } else {
        qrBox.style.display = 'none';
        qrToggle.textContent = 'Show QR to print';
      }
    };
  }

  function getPhotos(){
    try{ return JSON.parse(hidden.value || '[]'); }catch(e){ return []; }
  }
  function renderThumbs(){
    const photos = getPhotos();
    thumbsBox.innerHTML = photos.map((src, idx) => `
      <div class="photo-thumb-wrap" data-idx="${idx}">
        <img class="photo-preview" src="${src}" alt="">
        <button type="button" class="photo-thumb-remove" data-idx="${idx}" title="Remove">&times;</button>
      </div>
    `).join('');
    thumbsBox.querySelectorAll('.photo-thumb-remove').forEach(btn => {
      btn.onclick = () => {
        const photos2 = getPhotos();
        photos2.splice(parseInt(btn.getAttribute('data-idx'), 10), 1);
        hidden.value = JSON.stringify(photos2);
        renderThumbs();
      };
    });
  }
  renderThumbs();

  photoBtn.onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    const files = Array.from(fileInput.files || []);
    if(!files.length) return;
    errorMsg.style.display = 'none';
    const photos = getPhotos();
    try{
      for(const file of files){
        const dataUrl = await compressImage(file);
        photos.push(dataUrl);
      }
      hidden.value = JSON.stringify(photos);
      renderThumbs();
    }catch(e){
      errorMsg.textContent = 'Could not process one of those images, try again.';
      errorMsg.style.display = 'block';
    }
    fileInput.value = '';
  };
}

function renderClueBody(clue){
  const photos = clue.photos || (clue.photo ? [clue.photo] : []);
  return `
    ${clue.location ? `<span class="location-pill">&#128205; ${escapeHtml(clue.location)}</span>` : ''}
    ${photos.length ? `<div class="clue-photo-gallery">${photos.map(p => `<img class="clue-photo" src="${p}" alt="">`).join('')}</div>` : ''}
    <div>${escapeHtml(clue.text)}</div>
  `;
}

let activeStream = null;
let scanRAF = null;

let countdownTimer = null;
function clearCountdownTimer(){
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer = null; }
}
function formatCountdown(ms){
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const pad = n => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function startCountdown(targetMs, onComplete){
  clearCountdownTimer();
  function tick(){
    const el = document.getElementById('countdown-display');
    if(!el){ clearCountdownTimer(); return; }
    const remaining = targetMs - Date.now();
    if(remaining <= 0){
      clearCountdownTimer();
      onComplete();
      return;
    }
    el.textContent = formatCountdown(remaining);
  }
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function stopScanner(){
  if(scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if(activeStream){
    activeStream.getTracks().forEach(t => t.stop());
    activeStream = null;
  }
  const panel = document.getElementById('scanner-panel');
  if(panel) panel.innerHTML = '';
}

async function startScanner(onDetect){
  stopScanner();
  const panel = document.getElementById('scanner-panel');
  if(!panel) return;
  panel.innerHTML = `
    <div class="scanner-wrap">
      <video id="scanner-video" playsinline muted></video>
      <div class="scanner-frame"></div>
    </div>
    <p class="scanner-status" id="scanner-status">Point your camera at the printed code.</p>
    <button class="btn-ghost" id="scanner-cancel" style="margin-top:10px;">Cancel scan</button>
  `;
  document.getElementById('scanner-cancel').onclick = () => stopScanner();

  if(typeof jsQR === 'undefined'){
    document.getElementById('scanner-status').textContent = 'Scanner failed to load. Type the code instead.';
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById('scanner-status').textContent = 'Camera access isn\'t supported on this browser. Type the code instead.';
    return;
  }
  try{
    activeStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  }catch(e){
    document.getElementById('scanner-status').textContent = 'Camera permission was denied. Type the code instead.';
    return;
  }
  const video = document.getElementById('scanner-video');
  if(!video || !activeStream) return;
  video.srcObject = activeStream;
  try{ await video.play(); }catch(e){}

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  function tick(){
    if(!activeStream) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const result = jsQR(imageData.data, imageData.width, imageData.height);
      if(result && result.data){
        const found = result.data;
        stopScanner();
        onDetect(found);
        return;
      }
    }
    scanRAF = requestAnimationFrame(tick);
  }
  scanRAF = requestAnimationFrame(tick);
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

(async () => {
  await restoreSession();
  render();
})();
</script>
